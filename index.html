<!DOCTYPE html>
<html>
<head>
  <title>For Neki ❤️</title>
  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      color: white;
      margin-top: 100px;
    }

    p {
      color: white;
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      background: red;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear infinite;
    }

    @keyframes fall {
      0% { top: -10px; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>

<h1>💖 Neki 💖</h1>
<p>You are the best thing in my life ❤️</p>
<p>I made this just for you 🥺</p>

<button onclick="showMessage()">Click me 💌</button>

<script>
function showMessage() {
  alert("Neki, I love you so much ❤️");
}

setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
